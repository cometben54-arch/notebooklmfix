name = "notebooklm-fixer"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"

# Cloudflare KV Namespace binding
# Create with: npx wrangler kv namespace create NOTEBOOKLM_KV
# Then fill in the id below
[[kv_namespaces]]
binding = "NOTEBOOKLM_KV"
id = "YOUR_KV_NAMESPACE_ID"
# preview_id = "YOUR_PREVIEW_KV_NAMESPACE_ID"

# Cloudflare R2 Bucket binding (optional, for large images)
# Create with: npx wrangler r2 bucket create notebooklm-images
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "notebooklm-images"

# Environment variables (secrets)
# Set with: npx wrangler pages secret put GEMINI_API_KEY
# [vars]
# GEMINI_API_KEY = "" # Do NOT put secrets here, use `wrangler pages secret put`
